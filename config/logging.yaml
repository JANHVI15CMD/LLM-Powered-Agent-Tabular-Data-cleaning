version: 1
disable_existing_loggers: False
formatters:
  standard:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
  file:
    class: logging.FileHandler
    filename: logs/app.log
    formatter: standard
    level: INFO
loggers:
  app:
    handlers: [console, file]
    level: INFO
    propagate: False
root:
  level: INFO